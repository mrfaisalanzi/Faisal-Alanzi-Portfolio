<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faisal Portfolio</title>
    <style>
      #intro-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #ffffff;
        color: #000000;
        font-family: Arial, sans-serif;
        font-size: clamp(2rem, 6vw, 4rem);
        font-weight: 700;
        transition: opacity 0.4s ease;
        overflow: hidden;
      }

      #intro-screen.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      #intro-screen .intro-text {
        display: inline-block;
        animation: hello-pop 1s ease-out, hello-float 1.4s ease-in-out infinite;
      }

      #enter-btn {
        margin-top: 1rem;
        padding: 0.7rem 1.2rem;
        border: 1px solid #000;
        background: #fff;
        color: #000;
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        display: none;
      }

      #enter-btn:disabled {
        opacity: 0.5;
        cursor: default;
      }

      @keyframes hello-pop {
        0% {
          transform: scale(0.75);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      @keyframes hello-float {
        0% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
        100% {
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="intro-screen">
      <div>
        <span class="intro-text">Hello!</span>
        <div>
          <button id="enter-btn" type="button" disabled>Enter Website</button>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <audio id="bg-audio" loop preload="auto">
      <source src="/mysound.mp3" type="audio/mp3">
    </audio>

    <script>
      document.body.style.overflow = "hidden";
      const intro = document.getElementById("intro-screen");
      const enterBtn = document.getElementById("enter-btn");
      const bgAudio = document.getElementById("bg-audio");

      if (bgAudio) {
        bgAudio.load();
      }

      window.setTimeout(() => {
        const finishIntro = () => {
          if (intro) {
            intro.classList.add("is-hidden");
            window.setTimeout(() => intro.remove(), 450);
          }
          window.dispatchEvent(new Event("portfolio-enter"));
          document.body.style.overflowX = "hidden";
          document.body.style.overflowY = "auto";
        };

        if (bgAudio) {
          bgAudio
            .play()
            .then(() => {
              finishIntro();
            })
            .catch(() => {
              if (enterBtn) {
                enterBtn.style.display = "inline-block";
                enterBtn.disabled = false;
                enterBtn.addEventListener("click", () => {
                  bgAudio.play().catch(() => {});
                  finishIntro();
                });
              } else {
                finishIntro();
              }
            });
        } else {
          finishIntro();
        }
      }, 3500);
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
